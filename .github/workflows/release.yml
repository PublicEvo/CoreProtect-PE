name: Build Artifacts

on:
  push:
    branches:
      - master
    paths:
      - 'pom.xml'
      - 'src/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CoreProtect-${{ steps.version.outputs.version }}
          path: target/CoreProtect-*.jar
          if-no-files-found: error
          retention-days: 90

      - name: Send Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"🔔 **CoreProtect обновлён!**\n\n✅ Версия: **v${{ steps.version.outputs.version }}**\n📦 Скачать: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n⚠️ Не забудьте обновить плагин на сервере!\"}" \
              "$DISCORD_WEBHOOK"
          fi
