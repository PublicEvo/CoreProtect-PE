name: Create Release

on:
  push:
    branches:
      - master
    paths:
      - 'pom.xml'
      - 'src/**'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build with Maven
        run: mvn -B clean package

      - name: Get JAR filename
        id: jar
        run: |
          JAR_FILE=$(ls target/CoreProtect-*.jar | grep -v original | head -1)
          echo "file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release if exists
        if: steps.check_release.outputs.exists == 'true'
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" -y
          git push origin :refs/tags/v${{ steps.version.outputs.version }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CoreProtect-PE v${{ steps.version.outputs.version }}
          body: |
            ## CoreProtect-PE v${{ steps.version.outputs.version }}

            Auto-generated release from commit ${{ github.sha }}

            ### Installation
            Download `${{ steps.jar.outputs.name }}` and place it in your server's `plugins` folder.

            ### Changes
            See commit history: https://github.com/${{ github.repository }}/commits/master
          files: ${{ steps.jar.outputs.file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
