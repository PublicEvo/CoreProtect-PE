name: Sync with Upstream

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    name: Sync with PlayPro/CoreProtect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/PlayPro/CoreProtect.git || true
          git remote set-url upstream https://github.com/PlayPro/CoreProtect.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout master
          git merge upstream/master --no-edit || {
            echo "Merge conflict detected. Creating issue..."
            exit 1
          }

      - name: Push changes
        run: git push origin master

      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed - merge conflict',
              body: 'Automatic sync with upstream repository failed due to merge conflicts. Please resolve manually.',
              labels: ['sync-conflict']
            })
