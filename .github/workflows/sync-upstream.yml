name: Sync with Upstream

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    name: Sync with PlayPro/CoreProtect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/PlayPro/CoreProtect.git || true
          git remote set-url upstream https://github.com/PlayPro/CoreProtect.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout master
          if git merge upstream/master --no-edit; then
            echo "Merge successful"
          else
            echo "::error::Merge conflict detected. Please resolve manually."
            exit 1
          fi

      - name: Push changes
        run: git push origin master

      - name: Trigger build workflow
        if: success()
        uses: actions/github-script@v9.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'master'
            });
